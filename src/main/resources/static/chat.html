<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Room</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="chat-page">
    <div class="chat-container">

        <!-- Chat Header -->
        <div class="chat-header">
            <div class="header-left">
                <h2>💬 Chat Room</h2>
                <span id="user-info" class="user-info"></span>
            </div>
            <div class="header-right">
                <span id="connecting" class="connecting">Connecting...</span>
                <button id="logoutBtn" class="btn btn-small btn-logout">Logout</button>
            </div>
        </div>

        <!-- MODE TABS -->
        <div class="chat-tabs">
            <button id="tabGroup" class="chat-tab active">Group</button>
            <button id="tabDirect" class="chat-tab">Direct</button>
        </div>

        <!-- Admin Panel (hidden for normal users) -->
        <div id="admin-panel" class="admin-panel hidden">
            <div class="admin-header">
                <h3>🛡️ Admin Controls</h3>
                <button id="toggleAdmin" class="btn btn-small">Toggle Panel</button>
            </div>
            <div id="admin-controls" class="admin-controls">
                <button id="clearChatBtn" class="btn btn-danger btn-small">🗑️ Clear All Chat</button>
                <div class="admin-user-action">
                    <input type="text" id="banUserEmail" placeholder="Enter username to ban/unban/kick" class="form-control-sm" />
                    <button id="banUserBtn" class="btn btn-danger btn-small">Ban</button>
                    <button id="unbanUserBtn" class="btn btn-warning btn-small">Unban</button>
                    <button id="kickUserBtn" class="btn btn-warning btn-small">Kick</button>
                </div>
                <div class="admin-stats">
                    <button id="viewUsersBtn" class="btn btn-small">👥 View Users</button>
                    <button id="viewStatsBtn" class="btn btn-small">📊 Stats</button>
                </div>
                <div id="admin-output" class="admin-output hidden"></div>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="chat-main">

            <!-- DIRECT SIDEBAR -->
            <aside id="dmSidebar" class="dm-sidebar hidden">
                <div class="dm-search">
                    <input id="dmSearchInput" class="form-control" type="text" placeholder="Search username..." autocomplete="off" />
                    <div id="dmSearchResults" class="dm-search-results hidden"></div>
                </div>

                <div class="dm-hint">
                    Search a username and click to start chatting.
                </div>
            </aside>

            <!-- CHAT PANELS -->
            <section class="chat-panels">

                <!-- GROUP MESSAGES -->
                <ul id="messageArea"></ul>

                <!-- DIRECT MESSAGES -->
                <div id="dmPanel" class="dm-panel hidden">
                    <div class="dm-header">
                        <div>
                            <div class="dm-title">Direct Chat</div>
                            <div id="dmWith" class="dm-subtitle">Pick a user from search</div>
                        </div>
                        <span id="dmPresenceDot" class="presence-dot presence-offline" title="Offline"></span>
                    </div>
                    <ul id="dmMessageArea"></ul>
                </div>

            </section>
        </div>

        <!-- Message Input (used for BOTH group + dm) -->
        <div class="chat-input-area">
            <!-- Reply preview strip (shown when replying to a message) -->
            <div id="reply-preview" class="reply-preview hidden">
                <div class="reply-preview-bar"></div>
                <div class="reply-preview-body">
                    <span class="reply-preview-sender" id="replyPreviewSender"></span>
                    <span class="reply-preview-text" id="replyPreviewText"></span>
                </div>
                <button id="replyPreviewCancel" class="reply-preview-cancel" title="Cancel reply">✕</button>
            </div>

            <form id="messageForm">
                <div class="input-group">
                    <label for="fileInput" class="btn btn-file" title="Attach file">📎</label>
                    <input type="file" id="fileInput" class="hidden"
                           accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt,.zip,.rar" />

                    <input type="text" id="message" placeholder="Type a message..."
                           autocomplete="off" class="form-control" />

                    <button type="submit" class="btn btn-primary">Send</button>
                </div>
            </form>

            <div id="file-preview" class="file-preview hidden">
                <span id="file-preview-name"></span>
                <button id="file-preview-cancel" class="btn btn-small btn-danger">✕</button>
            </div>
        </div>

    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script src="/js/chat.js"></script>
</body>
</html>
