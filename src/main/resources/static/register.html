<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App - Register</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="auth-page">
    <div class="auth-container">
        <h1 class="title">📝 Create Account</h1>
        <p class="subtitle">Join the chat room</p>

        <!-- Error/Success Messages -->
        <div id="auth-message" class="auth-message hidden"></div>

        <!-- Register Form -->
        <form id="registerForm">
            <div class="form-group">
                <input type="text" id="regName" placeholder="Display Name"
                       autocomplete="name" class="form-control" required />
            </div>
            <div class="form-group">
                <input type="text" id="regUsername" placeholder="Username (unique)" class="form-control" required />
            </div>
            <div class="form-group">
                <input type="email" id="regEmail" placeholder="Email Address"
                       autocomplete="email" class="form-control" required />
            </div>
            <div class="form-group">
                <input type="password" id="regPassword" placeholder="Password"
                       autocomplete="new-password" class="form-control" required />
                <div class="password-requirements">
                    <p>Password must contain:</p>
                    <ul>
                        <li id="req-length">✗ At least 8 characters</li>
                        <li id="req-upper">✗ At least 1 uppercase letter</li>
                        <li id="req-lower">✗ At least 1 lowercase letter</li>
                        <li id="req-digit">✗ At least 1 digit</li>
                        <li id="req-special">✗ At least 1 special character (!@#$%^&*)</li>
                    </ul>
                </div>
            </div>
            <div class="form-group">
                <input type="password" id="regConfirmPassword" placeholder="Confirm Password"
                       autocomplete="new-password" class="form-control" required />
            </div>
            <div class="form-group">
                <button type="submit" class="btn btn-primary btn-full">Register</button>
            </div>
        </form>

        <!-- Divider -->
        <div class="divider">
            <span>OR</span>
        </div>

        <!-- Google Register -->
        <div class="form-group">
            <a href="/oauth2/authorization/google" class="btn btn-google btn-full">
                <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                    <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
                    <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
                    <path d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
                    <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
                </svg>
                Sign up with Google
            </a>
        </div>

        <!-- Login Link -->
        <div class="auth-footer">
            <p>Already have an account? <a href="/index.html">Login here</a></p>
        </div>
    </div>
</div>

<script src="/js/auth.js"></script>
</body>
</html>
